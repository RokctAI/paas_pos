name: Build iOS (Stable Only)

on:
  release:
    types: [published]

env:
  # 🛑 Monthly Limit for iOS Builds (Cost Control)
  MAX_MONTHLY_BUILDS: 4

jobs:
  check-quota:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Check Monthly Quota
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LIMIT="${{ env.MAX_MONTHLY_BUILDS }}"
          CURRENT_MONTH=$(date +%Y-%m)
          echo "Checking iOS Release Quota for $CURRENT_MONTH (Limit: $LIMIT)..."
          
          # List releases, filter for '-ios' suffix and current month creation date
          # Format: "tag_name published_at"
          COUNT=$(gh release list --limit 100 --json tagName,publishedAt --jq ".[] | select(.tagName | endswith(\"-ios\")) | select(.publishedAt | startswith(\"$CURRENT_MONTH\")) | .tagName" | wc -l)
          
          echo "Found $COUNT iOS releases this month."
          
          if [ "$COUNT" -ge "$LIMIT" ]; then
             echo "❌ Quota Exceeded ($COUNT >= $LIMIT). Skipping Build."
             echo "should_run=false" >> $GITHUB_OUTPUT
             # We exit success (0) so the workflow doesn't fail red, but the next job will be skipped.
          else
             echo "✅ Quota OK ($COUNT < $LIMIT). Proceeding."
             echo "should_run=true" >> $GITHUB_OUTPUT
          fi

  build-ios:
    needs: check-quota
    # Only run if Quota Check passed AND it's a stable release
    if: needs.check-quota.outputs.should_run == 'true' && (!github.event.release.prerelease)
    permissions:
      contents: write
    uses: RokctAI/shared-workflows/.github/workflows/universal-flutter-build.yml@main
    with:
      build-type: ios
      upload-artifact: true 
    secrets:
      IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
      IOS_MOBILEPROVISION_BASE64: ${{ secrets.IOS_MOBILEPROVISION_BASE64 }}
      IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}

  attach-ipa:
    needs: build-ios
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download IPA Artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-release-build
          path: ios_build
          
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ios_build/*.ipa
