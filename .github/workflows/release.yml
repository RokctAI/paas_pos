name: Auto Release (Weekly)
on:
  push:
    branches:
      - main
      - develop
      - "build_*"
  workflow_dispatch:
    inputs:
      backfill_ai_notes_cutoff_version:
        type: string
        default: ""
        description: "Regenerate AI release notes starting from this version (use 'all' for full history)"

      release_strategy:
        description: "Release Strategy"
        required: true
        default: "immediate"
        type: choice
        options:
        - immediate
        - weekly
      one_time_cleanup_cutoff_date:
        description: "Review One-time Cleanup Date (YYYY-MM-DD)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  pipeline:
    permissions:
      contents: write
      issues: write
      pull-requests: write
    uses: RokctAI/shared-workflows/.github/workflows/universal-pipeline.yml@main
    with:
      backfill_ai_notes_cutoff_version: ${{ inputs.backfill_ai_notes_cutoff_version }}
      project_type: 'flutter'
      app-type: 'pos'
      release_strategy: ${{ inputs.release_strategy || 'weekly' }}
      one_time_cleanup_cutoff_date: ${{ inputs.one_time_cleanup_cutoff_date }}
      brain_endpoint: "https://api.control.rokct.ai/api/v1/release-notes/generate"
      # Enable both Android and Windows builds
      build_android: true
      build_windows: true
      flutter-version: '3.24.0'
    secrets: inherit
