name: Auto Release (Weekly)
on:
  push:
    branches:
      - main
      - develop
  schedule:
    - cron: '0 16 * * 5' # Weekly Release on Friday at 4 PM UTC
  workflow_dispatch:
    inputs:
      release_strategy:
        description: "Release Strategy"
        required: true
        default: "immediate"
        type: choice
        options:
        - immediate
        - weekly
      one_time_cleanup_cutoff_date:
        description: "Review One-time Cleanup Date (YYYY-MM-DD)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  universal-release:
    uses: RokctAI/shared-workflows/.github/workflows/universal-release.yml@main
    with:
      release_strategy: ${{ inputs.release_strategy || 'weekly' }}
      one_time_cleanup_cutoff_date: ${{ inputs.one_time_cleanup_cutoff_date }}
      brain_endpoint: "https://api.control.rokct.ai/api/v1/release-notes/generate"
      # Enable both Android and Windows builds
      build_android: true
      build_windows: true
    secrets: inherit
